<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYCU GenAI HW01</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --sidebar-bg: #16213e;
      --surface: #0f3460;
      --accent: #e94560;
      --accent-hover: #c73652;
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --user-bubble: #0f3460;
      --assistant-bubble: #1e2a45;
      --input-bg: #16213e;
      --border: #2a3a5c;
      --scrollbar: #2a3a5c;
      --slider-track: #2a3a5c;
      --error-bg: #3d1a1a;
      --error-border: #e94560;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 18px;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    .sidebar-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-group label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 600;
    }

    select, textarea, input[type="number"], input[type="password"] {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.87rem;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, textarea:focus, input:focus {
      border-color: var(--accent);
    }

    #system-prompt {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      line-height: 1.5;
    }

    .divider {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 4px 0;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .param-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .param-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .param-label-row label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .param-value {
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--slider-track);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    #btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 8px 12px;
      text-align: center;
      transition: border-color 0.2s, color 0.2s;
      width: 100%;
    }

    #btn-clear:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-row label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--slider-track);
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: var(--accent);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    /* ── Main chat area ──────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Right prompt navigation ─────────────────────────── */
    #right-nav {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 18px;
      overflow-y: auto;
    }

    #right-nav h1 {
      font-size: 1.0rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.4px;
    }

    #prompt-nodes {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prompt-node {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 10px 10px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
    }

    .prompt-node:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .prompt-node.active {
      border-color: var(--accent);
      color: #fff;
      background: rgba(233, 69, 96, 0.12);
    }

    #prompt-nodes-empty {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
      padding: 8px 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 780px;
    }

    .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-role {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .msg-bubble {
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 0.92rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg-wrapper.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      border-bottom-right-radius: 4px;
    }

    .msg-wrapper.assistant .msg-bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown styles inside bubbles */
    .msg-bubble p { margin: 0 0 0.6em; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble pre {
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-bubble code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.85em;
    }
    .msg-bubble pre code { font-size: 0.82em; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
    .msg-bubble li { margin: 2px 0; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--accent);
      margin: 6px 0;
      padding-left: 12px;
      color: var(--text-muted);
    }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      margin: 10px 0 4px;
      font-weight: 600;
    }
    .msg-bubble a { color: var(--accent); }

    .routed-model-tag {
      font-size: 0.72rem;
      color: var(--text-muted, #888);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 2px 8px;
      margin-bottom: 4px;
      align-self: flex-start;
    }

    .msg-error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #ff8a8a;
      align-self: center;
      max-width: 700px;
    }

    /* ── Input area ──────────────────────────────────────── */
    #input-area {
      padding: 16px 32px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    #input-row:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      max-height: 200px;
      overflow-y: auto;
      font-family: inherit;
      padding: 0;
    }

    #btn-send {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 18px;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
      align-self: flex-end;
    }

    #btn-send:hover:not(:disabled) { background: var(--accent-hover); }
    #btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #empty-state .logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      opacity: 0.4;
    }

    #empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────────── -->
<aside id="sidebar">
  <h1>NYCU GenAI</h1>

  <div class="sidebar-group">
    <label>Model</label>
    <select id="model-select"></select>
  </div>

  <div class="sidebar-group">
    <label>System Prompt</label>
    <textarea id="system-prompt" placeholder="You are a helpful assistant…" rows="4"></textarea>
  </div>

  <div class="divider">Options</div>

  <div class="param-row">
    <div class="toggle-row">
      <label title="Automatically select the best model for the task">Auto-Routing</label>
      <label class="toggle-switch">
        <input type="checkbox" id="auto-route-toggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="param-row">
    <div class="toggle-row">
      <label>Streaming</label>
      <label class="toggle-switch">
        <input type="checkbox" id="streaming-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="divider">Parameters</div>

  <div class="param-row">
    <div class="param-label-row">
      <label>Temperature</label>
      <span class="param-value" id="temp-val">0.7</span>
    </div>
    <input type="range" id="temperature" min="0" max="2" step="0.01" value="0.7" />
  </div>

  <div class="param-row">
    <div class="param-label-row">
      <label>Top-P</label>
      <span class="param-value" id="topp-val">0.9</span>
    </div>
    <input type="range" id="top-p" min="0" max="1" step="0.01" value="0.9" />
  </div>

  <div class="param-row">
    <div class="param-label-row">
      <label>Max Tokens</label>
    </div>
    <input type="number" id="max-tokens" value="1024" min="64" max="32768" step="64" />
  </div>

  <button id="btn-export" style="margin-top: 10px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; padding: 8px 12px; text-align: center; transition: border-color 0.2s, color 0.2s; width: 100%;">Export History (.md)</button>
  <button id="btn-clear">Clear History</button>
</aside>

<!-- ── Main ──────────────────────────────────────────────── -->
<main id="main">
  <div id="messages">
    <div id="empty-state">
      <div class="logo">G</div>
      <p>Start chatting.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="image-preview-container" style="display: none; padding: 10px; border: 1px solid var(--border); border-bottom: none; background: var(--input-bg); border-top-left-radius: 14px; border-top-right-radius: 14px; position: relative;">
      <img id="image-preview" style="max-height: 100px; border-radius: 8px;">
      <button id="btn-remove-image" style="position: absolute; top: 5px; left: 105px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;">&times;</button>
    </div>
    <div id="input-row" style="position: relative;">
      <input type="file" id="file-input" accept="image/*" style="display: none;">
      <button id="btn-attach" title="Attach Image" style="background: transparent; border: none; cursor: pointer; color: var(--text-muted); padding: 0 5px; font-size: 1.2rem;">📎</button>
<textarea id="user-input" placeholder="Message Groq…" rows="1"></textarea>
      <button id="btn-send">Send</button>
    </div>
  </div>
</main>

<!-- ── Right navigation ───────────────────────────────────── -->
<aside id="right-nav">
  <h1>Prompts</h1>
  <div class="divider">Jump to</div>
  <div id="prompt-nodes">
    <div id="prompt-nodes-empty">Your sent prompts will appear here.</div>
  </div>
</aside>

<script>
  // ── State ─────────────────────────────────────────────────
  let streaming = false;
  let userPromptCounter = 0;
  let attachedImageBase64 = null;
  let csrfToken = "";

  // ── Fetch CSRF token at page load ─────────────────────────
  fetch("/csrf_token")
    .then(r => r.json())
    .then(data => { csrfToken = data.token || ""; })
    .catch(() => {});

  // ── DOM refs ──────────────────────────────────────────────
  const modelSelect   = document.getElementById("model-select");
  const systemPrompt  = document.getElementById("system-prompt");
  const tempSlider    = document.getElementById("temperature");
  const tempVal       = document.getElementById("temp-val");
  const toppSlider    = document.getElementById("top-p");
  const toppVal       = document.getElementById("topp-val");
  const maxTokens     = document.getElementById("max-tokens");
  const streamingToggle = document.getElementById("streaming-toggle");
  const autoRouteToggle = document.getElementById("auto-route-toggle");
  const btnClear      = document.getElementById("btn-clear");
  const btnExport     = document.getElementById("btn-export");
  const messagesEl    = document.getElementById("messages");
  const promptNodesEl = document.getElementById("prompt-nodes");
  const promptNodesEmptyEl = document.getElementById("prompt-nodes-empty");
  const userInput     = document.getElementById("user-input");
  const btnSend       = document.getElementById("btn-send");
  const emptyState    = document.getElementById("empty-state");
  
  const btnAttach     = document.getElementById("btn-attach");
  const fileInput     = document.getElementById("file-input");
  const imagePreviewContainer = document.getElementById("image-preview-container");
  const imagePreview  = document.getElementById("image-preview");
  const btnRemoveImage = document.getElementById("btn-remove-image");
  // ── Load models ───────────────────────────────────────────
  fetch("/models")
    .then(r => r.json())
    .then(({ models }) => {
      models.forEach((m, i) => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        if (i === 0) opt.selected = true;
        modelSelect.appendChild(opt);
      });
    });

  // ── Image Handling ──────────────────────────────────────────
  btnAttach.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (re) => {
        attachedImageBase64 = re.target.result;
        imagePreview.src = attachedImageBase64;
        imagePreviewContainer.style.display = "block";
      };
      reader.readAsDataURL(file);
    }
  });
  btnRemoveImage.addEventListener("click", () => {
    attachedImageBase64 = null;
    imagePreviewContainer.style.display = "none";
    fileInput.value = "";
  });

  // ── Chat Export ───────────────────────────────────────────
  btnExport.addEventListener("click", () => {
    window.location.href = "/export";
  });

  // ── Slider live update ─────────────────────────────────────
  tempSlider.addEventListener("input", () => {
    tempVal.textContent = parseFloat(tempSlider.value).toFixed(2);
  });
  toppSlider.addEventListener("input", () => {
    toppVal.textContent = parseFloat(toppSlider.value).toFixed(2);
  });

  // ── Auto-resize textarea ───────────────────────────────────
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 200) + "px";
  });

  // ── Send on Enter (Shift+Enter = newline) ──────────────────
  userInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!streaming) sendMessage();
    }
  });

  btnSend.addEventListener("click", () => {
    if (!streaming) sendMessage();
  });

  // ── Clear history ─────────────────────────────────────────
  btnClear.addEventListener("click", async () => {
    await fetch("/clear", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ csrf_token: csrfToken }),
    });
    messagesEl.innerHTML = "";
    messagesEl.appendChild(emptyState);
    emptyState.style.display = "flex";

    // Reset local prompt-jump UI state.
    document.querySelectorAll(".prompt-node").forEach(el => el.remove());
    if (promptNodesEmptyEl) promptNodesEmptyEl.style.display = "block";
    userPromptCounter = 0;
  });

  // ── Helpers ───────────────────────────────────────────────
  function hideEmptyState() {
    emptyState.style.display = "none";
  }

  function showRoutedModelTag(wrapper, modelName) {
    if (wrapper.querySelector(".routed-model-tag")) return;
    const tag = document.createElement("div");
    tag.className = "routed-model-tag";
    tag.textContent = "Auto-routed to: " + modelName;
    wrapper.insertBefore(tag, wrapper.querySelector(".msg-bubble"));
  }

  function appendMessage(role, content, isMarkdown = false) {
    hideEmptyState();
    const wrapper = document.createElement("div");
    wrapper.className = `msg-wrapper ${role}`;

    const roleLabel = document.createElement("div");
    roleLabel.className = "msg-role";
    roleLabel.textContent = role === "user" ? "You" : "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";

    if (isMarkdown) {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.textContent = content;
    }

    wrapper.appendChild(roleLabel);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  function appendError(msg) {
    hideEmptyState();
    const el = document.createElement("div");
    el.className = "msg-error";
    el.textContent = "Error: " + msg;
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function appendTypingIndicator() {
    hideEmptyState();
    const wrapper = document.createElement("div");
    wrapper.className = "msg-wrapper assistant";
    wrapper.id = "typing-wrapper";

    const roleLabel = document.createElement("div");
    roleLabel.className = "msg-role";
    roleLabel.textContent = "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    wrapper.appendChild(roleLabel);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return { wrapper, bubble };
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function scrollToUserMessage(el, nodeBtn = null) {
    const elRect = el.getBoundingClientRect();
    const containerRect = messagesEl.getBoundingClientRect();

    // Convert element position into the scrollable container's coordinate space.
    const targetTop = elRect.top - containerRect.top + messagesEl.scrollTop;

    messagesEl.scrollTo({
      top: Math.max(0, targetTop - 8),
      behavior: "smooth",
    });

    if (nodeBtn) {
      const prevActive = document.querySelector(".prompt-node.active");
      if (prevActive) prevActive.classList.remove("active");
      nodeBtn.classList.add("active");
    }
  }

  function setStreaming(val) {
    streaming = val;
    btnSend.disabled = val;
    userInput.disabled = val;
    btnSend.textContent = val ? "…" : "Send";
  }

  // ── Main send function ─────────────────────────────────────
  async function sendMessage() {
    const textMessage = userInput.value.trim();
    if (!textMessage && !attachedImageBase64) return;

    let payloadMessage = textMessage;
    let displayMessage = textMessage;

    if (attachedImageBase64) {
      payloadMessage = [
        { type: "text", text: textMessage || "What is in this image?" },
        { type: "image_url", image_url: { url: attachedImageBase64 } }
      ];
      displayMessage = (textMessage ? textMessage + "\n" : "") + "*(Image Attached)*";
    }

    userPromptCounter += 1;
    const userMsgId = `user-msg-${userPromptCounter}`;
    const userWrapperEl = appendMessage("user", displayMessage, true);
    userWrapperEl.id = userMsgId;
    addPromptNode(userPromptCounter, userMsgId, displayMessage);
    
    userInput.value = "";
    userInput.style.height = "auto";
    const currentAttachedImage = attachedImageBase64;
    attachedImageBase64 = null;
    imagePreviewContainer.style.display = "none";
    fileInput.value = "";

    const useStream = streamingToggle.checked;

    const payload = {
      message: payloadMessage,
      system_prompt: systemPrompt.value,
      model: modelSelect.value,
      temperature: parseFloat(tempSlider.value),
      top_p: parseFloat(toppSlider.value),
      max_tokens: parseInt(maxTokens.value, 10),
      stream: useStream,
      auto_route: autoRouteToggle.checked
    };

    setStreaming(true);
    const { wrapper, bubble } = appendTypingIndicator();

    try {
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!useStream) {
        // Non-streaming: parse JSON response
        const data = await response.json();
        if (!response.ok || data.error) {
          wrapper.remove();
          appendError(data.error || "Unexpected server error.");
          return;
        }
        bubble.innerHTML = marked.parse(data.content);
        if (data.model_used && data.original_model && data.model_used !== data.original_model) {
          showRoutedModelTag(wrapper, data.model_used);
        }
        scrollToBottom();
      } else {
        // Streaming: read SSE
        if (!response.ok) {
          const err = await response.json();
          wrapper.remove();
          appendError(err.error || "Unexpected server error.");
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let accText = "";
        let firstToken = true;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop(); // keep incomplete tail

          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith("data:")) continue;
            const raw = line.slice(5).trim();

            if (raw === "[DONE]") break;

            let parsed;
            try { parsed = JSON.parse(raw); } catch { continue; }

            if (parsed.error) {
              wrapper.remove();
              appendError(parsed.error);
              return;
            }

            if (parsed.routed_model) {
              showRoutedModelTag(wrapper, parsed.routed_model);
            }

            if (parsed.token !== undefined) {
              if (firstToken) {
                bubble.innerHTML = "";
                firstToken = false;
              }
              accText += parsed.token;
              bubble.innerHTML = marked.parse(accText);
              scrollToBottom();
            }
          }
        }
      }
    } catch (err) {
      wrapper.remove();
      appendError(err.message || "Network error.");
    } finally {
      setStreaming(false);
    }
  }

  function addPromptNode(num, targetId, promptText) {
    if (!promptNodesEl) return;
    if (promptNodesEmptyEl) promptNodesEmptyEl.style.display = "none";

    const nodeBtn = document.createElement("button");
    nodeBtn.type = "button";
    nodeBtn.className = "prompt-node";
    const label = makePromptLabel(promptText);
    nodeBtn.textContent = label;
    if (promptText) nodeBtn.title = promptText;
    nodeBtn.dataset.targetId = targetId;
    nodeBtn.addEventListener("click", () => {
      const el = document.getElementById(targetId);
      if (!el) return;
      scrollToUserMessage(el, nodeBtn);
    });
    promptNodesEl.appendChild(nodeBtn);
  }

  function makePromptLabel(text) {
    const oneLine = String(text || "")
      .replace(/\s+/g, " ")
      .trim();
    const maxLen = 32;
    if (oneLine.length <= maxLen) return oneLine || "(empty)";
    return oneLine.slice(0, maxLen - 3) + "...";
  }
</script>
</body>
